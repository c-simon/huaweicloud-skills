# .github/workflows/sync.yml
name: 同步上游仓库

on:
  schedule:
    # 每天 UTC 时间凌晨 2 点运行，即北京时间上午 10 点
    - cron: '0 2 * * *'
  # 也支持手动触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 配置上游地址并执行同步
        run: |
          # 添加上游仓库地址（请替换为原始仓库的实际地址）
          git remote add upstream https://github.com/huaweicloud/huaweicloud-skills.git
          git fetch upstream
          git checkout main
          git merge upstream/main
          git push origin main
