name: 同步技能索引到代码仓库

on:
  schedule:
    # 每天 UTC 时间 2:00 执行（北京时间 10:00）
    - cron: '0 2 * * *'
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: write             # 授予写入权限，用于 git push

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0      # 拉取完整历史，便于后续提交

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖（标准库已够用，无需额外安装）
        run: |
          python -m pip install --upgrade pip

      - name: 运行脚本生成索引文件
        run: python sync_skills.py

      - name: 提交并推送生成的索引文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills-index/
          if git diff --cached --quiet; then
            echo "没有需要提交的变更"
          else
            git commit -m "chore: auto-update skills index $(date -u '+%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:${{ github.ref_name }}
          fi
